version: 2
updates:
  # Python dependencies (discovers requirements/*.txt lock files, setup.py, etc.)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    cooldown:
      default-days: 14
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      # One PR/week for all runtime (production) minor + patch bumps
      production-dependencies:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      # One PR/week for all dev/test tooling minor + patch bumps
      development-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
    # Major bumps are intentionally left ungrouped so each gets its own
    # PR for individual review.
    allow:
      - dependency-type: "all"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    cooldown:
      default-days: 14
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      # One PR/week for all GitHub Actions bumps
      github-actions:
        patterns:
          - "*"
