name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Build test container (Python ${{ matrix.python-version }})
      run: |
        docker build -f Dockerfile.test \
          --build-arg PYTHON_VERSION=${{ matrix.python-version }} \
          -t ps-discovery-test:py${{ matrix.python-version }} .

    - name: Run tests with coverage
      run: |
        docker run --rm ps-discovery-test:py${{ matrix.python-version }} \
          python -m pytest tests/ -v --tb=short \
          --cov=planetscale_discovery --cov-report=xml --cov-report=term-missing

    - name: Extract coverage report
      if: matrix.python-version == '3.13'
      run: |
        docker run --rm -v ${{ github.workspace }}:/out ps-discovery-test:py${{ matrix.python-version }} \
          sh -c "python -m pytest tests/ --cov=planetscale_discovery --cov-report=xml -q && cp coverage.xml /out/"

    - name: Upload coverage to Codecov
      if: matrix.python-version == '3.13'
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v6
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Build test container
      run: docker build -f Dockerfile.test -t ps-discovery-test .

    - name: Run linting
      run: docker run --rm ps-discovery-test python -m flake8 planetscale_discovery tests

    - name: Check code formatting
      run: docker run --rm ps-discovery-test python -m black --check planetscale_discovery tests

    - name: Run type checking
      run: docker run --rm ps-discovery-test python -m mypy planetscale_discovery

  security:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Build test container
      run: docker build -f Dockerfile.test -t ps-discovery-test .

    - name: Run security checks
      run: docker run --rm ps-discovery-test python -m bandit -r planetscale_discovery/ -ll -c .bandit
