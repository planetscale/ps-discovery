name: Test Setup Script

on:
  # Only runs on the mac-test branch to control costs
  push:
    branches:
      - mac-test
    paths:
      - 'setup.sh'
      - 'planetscale_discovery/**'
      - '.github/workflows/test-setup.yml'
  # Manual trigger available from Actions tab
  workflow_dispatch:

jobs:
  test-macos:
    name: Test on macOS
    strategy:
      matrix:
        os:
          - macos-13      # Intel-based macOS
          - macos-14      # Apple Silicon (M1) macOS
        python-version:
          - "3.12"
          - "3.13"
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run setup script (database only)
        run: |
          # Answer 'n' to all optional cloud providers
          echo -e "n\nn\nn" | bash setup.sh

      - name: Verify installation
        run: |
          source venv/bin/activate
          python3 -m planetscale_discovery --help

      - name: Test config generation
        run: |
          source venv/bin/activate
          python3 -m planetscale_discovery config-template --output test-config.yaml
          test -f test-config.yaml

      - name: Test with AWS dependencies
        run: |
          rm -rf venv sample-config.yaml
          echo -e "y\nn\nn" | bash setup.sh
          source venv/bin/activate
          python3 -c "import boto3; print('AWS dependencies OK')"

      - name: Test with GCP dependencies
        run: |
          rm -rf venv sample-config.yaml
          echo -e "n\ny\nn" | bash setup.sh
          source venv/bin/activate
          python3 -c "from google.cloud import compute_v1; print('GCP dependencies OK')"

      - name: Test with Supabase dependencies
        run: |
          rm -rf venv sample-config.yaml
          echo -e "n\nn\ny" | bash setup.sh
          source venv/bin/activate
          python3 -c "import requests; print('Supabase dependencies OK')"

  test-linux-containers:
    name: Test on Linux (Docker)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        distro:
          - ubuntu:22.04
          - ubuntu:24.04
          - debian:11
          - debian:12
          - amazonlinux:2023
          - rockylinux:9
          - fedora:39

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up test environment
        run: |
          # Determine package manager and install command
          case "${{ matrix.distro }}" in
            ubuntu:*|debian:*)
              INSTALL_CMD="apt-get update && apt-get install -y python3 python3-pip python3-venv"
              ;;
            amazonlinux:*|rockylinux:*|fedora:*)
              if [[ "${{ matrix.distro }}" == "amazonlinux:*" ]]; then
                INSTALL_CMD="yum install -y python3 python3-pip && python3 -m ensurepip --upgrade"
              elif [[ "${{ matrix.distro }}" == "fedora:*" ]]; then
                INSTALL_CMD="dnf install -y python3 python3-pip"
              else
                INSTALL_CMD="dnf install -y python3 python3-pip && python3 -m ensurepip --upgrade"
              fi
              ;;
          esac

          # Create Dockerfile
          cat > Dockerfile.test <<EOF
          FROM ${{ matrix.distro }}

          # Install Python
          RUN $INSTALL_CMD

          # Copy package
          COPY . /app
          WORKDIR /app

          # Run setup
          RUN echo -e "n\nn\nn" | bash setup.sh || exit 1

          # Verify installation
          RUN bash -c "source venv/bin/activate && python3 -m planetscale_discovery --help" || exit 1
          EOF

      - name: Build and test
        run: |
          docker build -f Dockerfile.test -t test-${{ matrix.distro }} .

  test-edge-cases:
    name: Test Edge Cases
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Test with old Python (3.8 - should fail)
        run: |
          docker run -v $(pwd):/app -w /app python:3.8-slim bash -c "
            apt-get update && apt-get install -y python3-venv
            ./setup.sh 2>&1 | tee output.log
            if grep -q 'Python 3.9 or higher is required' output.log; then
              echo 'Correctly rejected Python 3.8'
              exit 0
            else
              echo 'Should have rejected Python 3.8'
              exit 1
            fi
          " || true

      - name: Test without directory structure (should fail)
        run: |
          mkdir /tmp/empty-test
          cp setup.sh /tmp/empty-test/
          cd /tmp/empty-test
          if ./setup.sh 2>&1 | grep -q 'planetscale_discovery/ directory not found'; then
            echo 'Correctly detected missing directory'
          else
            echo 'Should have detected missing directory'
            exit 1
          fi

      - name: Test with broken venv
        run: |
          # Create venv in one location
          python3 -m venv /tmp/test-venv
          # Move it (breaks hardcoded paths)
          mv /tmp/test-venv ./venv
          # Run setup - should detect and recreate
          echo -e "n\nn\nn" | bash setup.sh
          source venv/bin/activate
          python3 -m planetscale_discovery --help
