# Database Discovery Only Configuration
# For discovering PostgreSQL database environments

# Database engine to analyze: postgres or mysql
engine: postgres

database:
  host: localhost
  port: 5432
  database: your_database_name
  username: your_username
  password: your_password
  ssl_mode: prefer
  connection_timeout: 30

output:
  output_dir: ./discovery_output

log_level: INFO