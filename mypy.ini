[mypy]
python_version = 3.9
warn_return_any = False
warn_unused_configs = True
disallow_untyped_defs = False
ignore_missing_imports = True
no_implicit_optional = False

# Ignore specific error codes that are too strict for this codebase
disable_error_code = var-annotated, assignment, attr-defined, arg-type, return-value, index, operator, type-var

[mypy-psycopg2.*]
ignore_missing_imports = True

[mypy-yaml.*]
ignore_missing_imports = True

[mypy-google.*]
ignore_missing_imports = True

[mypy-boto3.*]
ignore_missing_imports = True

[mypy-botocore.*]
ignore_missing_imports = True

[mypy-requests.*]
ignore_missing_imports = True
